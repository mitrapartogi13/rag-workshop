<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Workshop Alpro ITS</title>
    <style>
      :root {
        --primary-blue: #004a8f;
        --light-blue: #e6f0fa;
        --bg-color: #f3f4f6;
        --chat-bg: #ffffff;
        --text-main: #1f2937;
        --border-color: #e5e7eb;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .chat-container {
        width: 100%;
        max-width: 600px;
        background: var(--chat-bg);
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
        height: 85vh;
        overflow: hidden;
      }

      .chat-header {
        background-color: var(--primary-blue);
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      #chat-box {
        flex-grow: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        background-color: #fafafa;
      }

      .message {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 12px;
        line-height: 1.5;
        word-wrap: break-word;
      }

      .message p {
        margin: 5px 0;
      }

      .user-msg {
        align-self: flex-end;
        background-color: var(--primary-blue);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .bot-msg {
        align-self: flex-start;
        background-color: var(--light-blue);
        color: var(--text-main);
        border-bottom-left-radius: 4px;
        border: 1px solid var(--border-color);
      }

      .error-msg {
        align-self: center;
        background-color: #fee2e2;
        color: #b91c1c;
        font-size: 0.9rem;
        border-radius: 8px;
        padding: 8px 12px;
      }

      .typing-indicator span {
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: #6b7280;
        border-radius: 50%;
        margin: 0 2px;
        animation: bounce 1.2s infinite;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-6px);
        }
      }

      .upload-area {
        padding: 10px 15px;
        background: white;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .upload-status {
        font-size: 0.85rem;
        color: #6b7280;
      }

      .upload-status.success {
        color: #059669;
      }
      .upload-status.error {
        color: #dc2626;
      }

      .input-area {
        display: flex;
        padding: 15px;
        background: white;
        border-top: 1px solid var(--border-color);
        gap: 10px;
      }

      input[type="text"] {
        flex-grow: 1;
        padding: 12px 15px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus {
        border-color: var(--primary-blue);
      }

      button {
        background-color: var(--primary-blue);
        color: white;
        border: none;
        padding: 0 20px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: #003366;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre"],
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">RAG Workshop by Alpro ITS</div>
      <div id="chat-box"></div>
      <div class="upload-area">
        <input
          type="file"
          id="pdf-input"
          accept=".pdf"
          style="display: none"
          onchange="uploadPDF()" />
        <button onclick="document.getElementById('pdf-input').click()">
          Upload PDF
        </button>
        <span id="upload-status" class="upload-status"
          >No PDF uploaded yet</span
        >
      </div>
      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="Type a message..."
          onkeypress="handleKeyPress(event)" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      async function uploadPDF() {
        const fileInput = document.getElementById("pdf-input");
        const statusEl = document.getElementById("upload-status");
        const file = fileInput.files[0];
        if (!file) return;

        statusEl.textContent = "Uploading...";
        statusEl.className = "upload-status";

        const formData = new FormData();
        formData.append("file", file);

        try {
          const response = await fetch("http://localhost:8000/upload", {
            method: "POST",
            body: formData,
          });
          const data = await response.json();

          if (data.error) {
            statusEl.textContent = `Error: ${data.error}`;
            statusEl.className = "upload-status error";
          } else {
            statusEl.textContent = `${file.name} processed successfully (${data.chunks} chunks)`;
            statusEl.className = "upload-status success";
          }
        } catch (error) {
          statusEl.textContent = "Error: Could not connect to the server";
          statusEl.className = "upload-status error";
        }

        fileInput.value = "";
      }

      function handleKeyPress(event) {
        if (event.key === "Enter") {
          sendMessage();
        }
      }

      async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = inputField.value.trim();

        if (!message) return;

        chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        const typingDiv = document.createElement("div");
        typingDiv.className = "message bot-msg typing-indicator";
        typingDiv.id = "typing-indicator";
        typingDiv.innerHTML = "<span></span><span></span><span></span>";
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
          const response = await fetch("http://localhost:8000/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message }),
          });
          const data = await response.json();

          document.getElementById("typing-indicator")?.remove();

          const botDiv = document.createElement("div");
          botDiv.className = "message bot-msg";
          botDiv.innerHTML = marked.parse(data.response);
          chatBox.appendChild(botDiv);

          if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise([botDiv]);
          }

          chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
          document.getElementById("typing-indicator")?.remove();
          chatBox.innerHTML += `<div class="message error-msg">Error: Check server logs.</div>`;
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }
    </script>
  </body>
</html>
